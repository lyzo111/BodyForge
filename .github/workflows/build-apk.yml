name: Build Debug APK

on:
  push:
    tags:
      - 'apk-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace
      - name: Locate APK
        id: apk
        run: echo "path=$(find composeApp/build/outputs/apk/debug -name '*.apk' | head -n 1)" >> "$GITHUB_OUTPUT"
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="apk-manual-$(date +%Y%m%d-%H%M%S)"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          APK="${{ steps.apk.outputs.path }}"
          # Idempotent: update the asset if the release already exists, otherwise create it,
          # so re-running on an existing tag does not fail.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" \
              --title "Debug APK $TAG" \
              --notes "Automated debug build of BodyForge."
          fi
